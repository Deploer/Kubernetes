<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание матчей КХЛ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>КХЛ — Расписание матчей</h1>
  </header>

  <main>
    <section class="filters">
      <label for="date-filter">Дата:</label>
      <input type="date" id="date-filter">

      <label for="team-filter">Команда:</label>
      <input type="text" id="team-filter" placeholder="Введите название команды">

      <button id="clear-filters">Сбросить фильтры</button>
    </section>

    <section class="matches">
      <ul id="matches-list"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 КХЛ. Все права защищены. Версия 10.0.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
